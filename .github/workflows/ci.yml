name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quick-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest -q

  smoke-e2e:
    runs-on: ubuntu-latest
    needs: quick-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Run smoke workflow
        run: |
          python scripts/train.py --config config/smoke.yaml --outdir results/ci_smoke
          python scripts/evaluate.py --config config/smoke.yaml --checkpoint results/ci_smoke/best_model.pt --outdir results/ci_smoke
          python scripts/plot_results.py --config config/smoke.yaml --csv results/ci_smoke/ber_results.csv --checkpoint results/ci_smoke/best_model.pt --outdir results/ci_smoke

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-results
          path: results/ci_smoke
