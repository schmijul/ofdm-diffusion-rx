seed: 123

device:
  prefer_cuda: true

ofdm:
  n_subcarriers: 32
  cp_length: 8
  n_pilot_subcarriers: 8
  pilot_pattern: comb
  n_ofdm_symbols: 8

modulation:
  order: 16
  bit_one_prob: 0.1

channel:
  model: rayleigh
  n_taps: 6
  max_delay_spread: 5.0e-6
  doppler_hz: 0.0
  exp_decay: 0.7

receiver:
  estimation_method: dft_linear
  dft_tap_truncation: 6
  snr_definition: sample

snr_range_db: [0.0, 12.0]
snr_step_db: 4.0

training:
  snr_train_range_db: [0.0, 20.0]
  n_train_samples: 30000
  n_val_samples: 6000
  batch_size: 256
  epochs: 16
  lr: 1.0e-4
  optimizer: adam

diffusion:
  n_timesteps: 120
  beta_start: 1.0e-4
  beta_end: 0.02
  schedule: linear
  inference_steps: 80

  model:
    type: residual_mlp
    hidden_dim: 640
    n_res_blocks: 12
    time_embedding_dim: 256

evaluation:
  n_test_frames: 120
  constellation_snrs_db: [0.0, 8.0, 12.0]
