seed: 123

device:
  prefer_cuda: true

ofdm:
  n_subcarriers: 64
  cp_length: 16
  n_pilot_subcarriers: 8
  pilot_pattern: comb
  n_ofdm_symbols: 10

modulation:
  order: 16
  bit_one_prob: 0.462

channel:
  model: rayleigh
  n_taps: 8
  max_delay_spread: 5.0e-6
  doppler_hz: 0.0
  exp_decay: 0.7

receiver:
  estimation_method: linear
  dft_tap_truncation: 8
  snr_definition: sample

snr_range_db: [0.0, 12.0]
snr_step_db: 6.0

training:
  snr_train_range_db: [0.0, 25.0]
  n_train_samples: 12000
  n_val_samples: 2400
  batch_size: 256
  epochs: 8
  lr: 1.0e-4
  optimizer: adam

diffusion:
  n_timesteps: 80
  beta_start: 1.0e-4
  beta_end: 0.02
  schedule: linear
  inference_steps: 15

  model:
    type: residual_mlp
    hidden_dim: 256
    n_res_blocks: 6
    time_embedding_dim: 128

evaluation:
  n_test_frames: 120
  constellation_snrs_db: [0.0, 6.0, 12.0]
